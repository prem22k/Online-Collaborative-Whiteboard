<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { overflow-x: hidden; }
      html, body, #root { width: 100%; min-height: 100vh; }
      /* Prevent pull-to-refresh and bounce on mobile */
      body { overscroll-behavior: none; }
      /* Prevent callout on long-press */
      canvas { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
    </style>
    <title>Online Collaborative Whiteboard</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
